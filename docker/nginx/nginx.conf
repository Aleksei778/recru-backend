user nginx;

worker_processes auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;

    use epoll;

    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '[$request_id] $remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;

    client_body_buffer_size 128k;
    client_max_body_size 4m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    server_names_hash_bucket_size 128;
    types_hash_max_size 2048;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml;

    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    fastcgi_buffering on;
    fastcgi_buffer_size 16k;
    fastcgi_buffers 16 16k;
    fastcgi_busy_buffers_size 32k;
    fastcgi_temp_file_write_size 256k;

    fastcgi_cache_path /tmp/nginx_cache levels=1:2 keys_zone=php_cache:10m max_size=100m inactive=60m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";

    server {
        listen 80;
        server_name localhost;

        access_log  /dev/stdout;
        error_log  /dev/stderr;

        root /var/www/backend/public;
        index index.php;

        location / {
          try_files $uri /index.php$is_args$args;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_X_REQUEST_ID $request_id;

            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 600s;
            fastcgi_read_timeout 600s;

            fastcgi_buffering on;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;

            fastcgi_cache off;

            fastcgi_intercept_errors on;

            add_header X-Cache-Status $upstream_cache_status always;

            try_files $uri =404;
        }

        location ~ /\. {
          deny all;
          access_log off;
          log_not_found off;
        }

        location ~ /\.(ht|env|ini|log|sh|sql|conf)$ {
          deny all;
          access_log off;
          log_not_found off;
        }
    }
}
